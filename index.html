<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swathi Sambasivam — Game Developer & UX Designer</title>
  <meta name="description" content="Portfolio of Swathi Sambasivam — Unity game developer, UX designer, and storyteller based in Brooklyn.">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1c2b1a; overflow: hidden; height: 100vh; font-family: 'DM Mono', monospace; }
    .scene { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; background: #1c2b1a; }

    /* GRID BACKGROUND */
    .bg-grid { position: absolute; inset: 0; display: grid; perspective: 1200px; z-index: 0; }
    .cell {
      position: relative;
      background: #1c2b1a;
      border: 1px solid rgba(122,184,74,0.06);
      transition: background-color 0.25s ease;
      cursor: pointer;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .cell::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: transparent; transition: background 0.08s ease;
    }
    .cell:hover::after { background: rgba(184,216,144,0.14); }
    .cell.flip { animation: flipPop 0.7s cubic-bezier(0.5,0,0.5,1) forwards; z-index: 5; }
    @keyframes flipPop {
      0%   { transform: rotateY(0deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.22); }
      100% { transform: rotateY(360deg) scale(1); }
    }

    canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; pointer-events: none; }

    .content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; padding: 40px 24px; pointer-events: none; }
    .content > * { pointer-events: auto; }

    .wip-badge { display: inline-flex; align-items: center; gap: 7px; background: rgba(239,159,39,0.15); border: 1px solid rgba(239,159,39,0.5); border-radius: 20px; padding: 5px 16px; font-size: 11px; letter-spacing: 2px; color: #EF9F27; text-transform: uppercase; animation: pb 2.5s ease-in-out infinite; }
    .wip-dot { width:6px; height:6px; border-radius:50%; background:#EF9F27; animation:bd 1s step-end infinite; }
    @keyframes pb { 0%,100%{opacity:0.7} 50%{opacity:1} }
    @keyframes bd { 0%,100%{opacity:1} 50%{opacity:0} }

    .name-row { display:flex; align-items:center; justify-content:center; flex-wrap:wrap; }
    .letter { font-family: 'Playfair Display', serif; font-size: clamp(36px,6vw,58px); font-weight: 400; color: #e8d8a8; display: inline-block; cursor: default; line-height: 1.1; user-select: none; text-shadow: 0 2px 24px rgba(60,100,30,0.5); transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), color 0.05s linear, text-shadow 0.05s linear; }
    .letter.space { width: 16px; }
    .letter:hover { transform: translateY(-10px) rotate(-5deg); }

    .role { font-size: 11px; letter-spacing: 4px; color: rgba(180,220,120,0.75); text-transform: uppercase; }
    .divider { width: 80px; height: 1px; background: rgba(122,184,74,0.3); }

    .glass-panel { background: rgba(20,32,18,0.75); border: 1px solid rgba(122,184,74,0.25); border-radius: 8px; padding: 12px 16px; min-width: 320px; display: flex; flex-direction: column; align-items: center; gap: 3px; backdrop-filter: blur(8px); }
    .menu-item { font-family: 'DM Mono', monospace; font-size: 13px; color: #b8d890; letter-spacing: 2px; padding: 8px 20px; border: 1px solid transparent; border-radius: 3px; cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; background: transparent; width: 100%; text-align: center; }
    .menu-item:hover { background: rgba(122,184,74,0.15); border-color: rgba(122,184,74,0.5); color: #e8d8a8; }
    .arr { color: rgba(122,184,74,0.5); font-size: 10px; opacity: 0; transition: opacity 0.15s; }
    .menu-item:hover .arr { opacity: 1; }
    .cat-divider { width: 100%; height: 1px; background: rgba(122,184,74,0.18); margin: 3px 0; }
    .cat-row { display: flex; align-items: center; width: 100%; gap: 8px; }
    .pulse-l { font-size: 13px; color: rgba(122,184,74,0.8); animation: pl 2s ease-in-out infinite; user-select: none; flex-shrink: 0; }
    .pulse-r { font-size: 13px; color: rgba(122,184,74,0.8); animation: pr 2s ease-in-out infinite; user-select: none; flex-shrink: 0; }
    @keyframes pl { 0%,100%{opacity:0.3;transform:translateX(0)} 50%{opacity:1;transform:translateX(3px)} }
    @keyframes pr { 0%,100%{opacity:0.3;transform:translateX(0)} 50%{opacity:1;transform:translateX(-3px)} }

    .quiz-wrap { display: none; margin-top: 10px; background: rgba(20,32,18,0.9); border: 1px solid rgba(122,184,74,0.35); border-radius: 6px; padding: 20px 24px; width: 320px; }
    .quiz-wrap.open { display: block; animation: fi 0.3s ease both; }
    @keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .progress { display:flex; gap:5px; margin-bottom:12px; }
    .pip { flex:1; height:3px; background:rgba(122,184,74,0.25); border-radius:2px; transition:background 0.3s; }
    .pip.done { background:rgba(184,216,144,0.85); }
    .q-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .q-step { font-size:10px; letter-spacing:2px; color:rgba(122,184,74,0.8); }
    .back-btn { font-size:10px; color:rgba(122,184,74,0.7); background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace; }
    .back-btn:hover { color:#b8d890; }
    .q-text { font-family:'Playfair Display',serif; font-size:15px; color:#e8d8a8; margin-bottom:12px; line-height:1.5; font-weight:400; }
    .q-options { display:flex; flex-direction:column; gap:6px; }
    .q-opt { font-family:'DM Mono',monospace; font-size:11px; color:#b8d890; padding:7px 12px; border:1px solid rgba(122,184,74,0.25); border-radius:3px; cursor:pointer; text-align:left; background:transparent; transition:all 0.1s; }
    .q-opt:hover { background:rgba(122,184,74,0.15); border-color:rgba(122,184,74,0.55); color:#e8d8a8; }
    .result-area { display:none; }
    .result-area.open { display:block; }
    .result-label { font-size:10px; letter-spacing:3px; color:rgba(184,216,144,0.85); text-transform:uppercase; margin-bottom:8px; }
    .result-game { font-family:'Playfair Display',serif; font-size:20px; color:#e8d8a8; margin-bottom:6px; font-weight:400; }
    .result-desc { font-size:11px; color:#b8d890; line-height:1.7; margin-bottom:14px; }
    .result-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .result-go { font-family:'DM Mono',monospace; font-size:11px; color:#1c2b1a; background:#b8d890; padding:6px 14px; border-radius:3px; cursor:pointer; border:none; letter-spacing:1px; }
    .result-go:hover { background:#d8e8a8; }
    .restart-btn { font-family:'DM Mono',monospace; font-size:11px; color:#b8d890; background:transparent; border:1px solid rgba(122,184,74,0.35); padding:6px 14px; border-radius:3px; cursor:pointer; }
    .restart-btn:hover { border-color:rgba(122,184,74,0.75); color:#e8d8a8; }
  </style>
</head>
<body>
<div class="scene" id="scene">
  <div class="bg-grid" id="bgGrid"></div>
  <canvas id="c"></canvas>
  <div class="content">
    <div class="wip-badge"><div class="wip-dot"></div>work in progress</div>
    <div class="name-row" id="nr"></div>
    <div class="role">Game Developer &nbsp;&middot;&nbsp; UX Designer</div>
    <div class="divider"></div>
    <div class="glass-panel">
      <a class="menu-item" href="games.html"><span class="arr">&#9658;</span>Games<span class="arr">&#9658;</span></a>
      <a class="menu-item" href="art.html"><span class="arr">&#9658;</span>Art<span class="arr">&#9658;</span></a>
      <a class="menu-item" href="about.html"><span class="arr">&#9658;</span>About<span class="arr">&#9658;</span></a>
      <div class="cat-divider"></div>
      <div class="cat-row">
        <span class="pulse-l">&#x276F;</span>
        <button class="menu-item" id="startQuiz" style="flex:1">Choose Your Own Adventure (and Cat)</button>
        <span class="pulse-r">&#x276E;</span>
      </div>
    </div>
    <div class="quiz-wrap" id="quizWrap">
      <div id="quizContent">
        <div class="progress"><div class="pip" id="pip0"></div><div class="pip" id="pip1"></div><div class="pip" id="pip2"></div></div>
        <div class="q-header"><span class="q-step" id="qStep">Question 1 of 3</span><button class="back-btn" id="backBtn" style="display:none">&#9664; back</button></div>
        <div class="q-text" id="qText"></div>
        <div class="q-options" id="qOptions"></div>
      </div>
      <div class="result-area" id="resultArea">
        <div class="result-label">Your familiar found you</div>
        <div class="result-game" id="resultGame"></div>
        <div class="result-desc" id="resultDesc"></div>
        <div class="result-actions">
          <button class="result-go" id="resultLink">View project</button>
          <button class="restart-btn" id="restartBtn">&#8635; Start over</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const lc=['#a855f7','#9333ea','#7c3aed','#6366f1','#3b82f6','#0ea5e9','#06b6d4','#14b8a6','#10b981','#22c55e','#84cc16','#eab308','#f97316','#ef4444','#ec4899','#d946ef'];

"Swathi Sambasivam".split('').forEach(ch=>{
  const s=document.createElement('span');
  if(ch===' '){s.className='letter space';}
  else{
    s.className='letter';
    s.textContent=ch;
    s.addEventListener('mouseenter',()=>{
      const col=lc[Math.floor(Math.random()*lc.length)];
      s.style.color=col;
      s.style.textShadow=`0 2px 28px ${col}aa`;
    });
  }
  document.getElementById('nr').appendChild(s);
});

// GRID BACKGROUND — large squares, hover highlight, click = flip & reveal colour
const CELL=140;
const grid=document.getElementById('bgGrid');
function buildGrid(){
  const W=window.innerWidth,H=window.innerHeight;
  const cols=Math.ceil(W/CELL),rows=Math.ceil(H/CELL);
  grid.style.gridTemplateColumns=`repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows=`repeat(${rows}, 1fr)`;
  grid.innerHTML='';
  for(let i=0;i<cols*rows;i++){
    const c=document.createElement('div');
    c.className='cell';
    c.addEventListener('click',()=>{
      if(c.classList.contains('flip'))return;
      const col=lc[Math.floor(Math.random()*lc.length)];
      c.classList.add('flip');
      setTimeout(()=>{c.style.backgroundColor=col;},350);
      setTimeout(()=>{c.classList.remove('flip');},700);
    });
    grid.appendChild(c);
  }
}
buildGrid();

// STARS + SHOOTING STARS on overlay canvas
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',()=>{resize();buildGrid();});

const tw=Array.from({length:70},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.1+.2,ph:Math.random()*Math.PI*2,sp:Math.random()*.045+.012}));
const sh=[];
function spSh(){
  const e=Math.floor(Math.random()*4);let x,y;
  if(e===0){x=Math.random();y=0;}
  else if(e===1){x=1;y=Math.random();}
  else if(e===2){x=Math.random();y=1;}
  else{x=0;y=Math.random();}
  sh.push({x,y,a:Math.random()*Math.PI*2,l:Math.random()*.09+.04,sp:Math.random()*.007+.004,al:1,w:Math.random()*1+.3});
}
setInterval(spSh,950);

function draw(){
  ctx.clearRect(0,0,W,H);
  tw.forEach(s=>{
    s.ph+=s.sp;
    const a=((Math.sin(s.ph)+1)/2)*.85+.1;
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(220,230,180,${a*.6})`;ctx.fill();
  });
  for(let i=sh.length-1;i>=0;i--){
    const s=sh[i];
    s.x+=Math.cos(s.a)*s.sp;s.y+=Math.sin(s.a)*s.sp;s.al-=.011;
    if(s.al<=0||s.x<-.15||s.x>1.15||s.y<-.15||s.y>1.15){sh.splice(i,1);continue;}
    const x1=s.x*W,y1=s.y*H,x2=x1-Math.cos(s.a)*s.l*W,y2=y1-Math.sin(s.a)*s.l*H;
    const sg=ctx.createLinearGradient(x2,y2,x1,y1);
    sg.addColorStop(0,'rgba(200,220,150,0)');
    sg.addColorStop(1,`rgba(240,240,200,${s.al})`);
    ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x1,y1);
    ctx.strokeStyle=sg;ctx.lineWidth=s.w;ctx.stroke();
    ctx.beginPath();ctx.arc(x1,y1,s.w+.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(250,250,220,${s.al})`;ctx.fill();
  }
  requestAnimationFrame(draw);
}
draw();

const qs=[{text:"What kind of world do you want to step into?",opts:[{l:"Something that might actually help me",v:"a"},{l:"A mystery I can unravel slowly",v:"b"},{l:"Somewhere strange and a little chaotic",v:"c"}]},{text:"How do you feel about other people?",opts:[{l:"They're hard, but worth it",v:"a"},{l:"Fascinating — I love a good conspiracy",v:"b"},{l:"Honestly? It's complicated",v:"c"}]},{text:"Pick your vibe:",opts:[{l:"Hopeful and a little anxious",v:"a"},{l:"Investigative and obsessive",v:"b"},{l:"Weird and emotionally honest",v:"c"}]}];
const rs={a:{game:"StarStarter",desc:"A clinically-validated mobile game for social anxiety. Gentle, research-backed, and made with care.",url:"games/starstarter.html"},b:{game:"The Mix Archives",desc:"An investigative narrative game about online conspiracies. Dig deep, question everything.",url:"games/mixarchives.html"},c:{game:"Normal Bad Sex",desc:"A playable podcast about negative sexual experiences — strange, honest, and necessary.",url:"games/normalbadsex.html"}};
function gR(ans){const c={a:0,b:0,c:0};ans.forEach(v=>c[v]++);return rs[Object.keys(c).sort((x,y)=>c[y]-c[x])[0]];}
let step=0,answers=[];
function rQ(){const q=qs[step];document.getElementById('qStep').textContent='Question '+(step+1)+' of 3';document.getElementById('qText').textContent=q.text;document.getElementById('backBtn').style.display=step>0?'block':'none';const o=document.getElementById('qOptions');o.innerHTML='';q.opts.forEach(op=>{const b=document.createElement('button');b.className='q-opt';b.textContent=op.l;b.onclick=()=>{answers[step]=op.v;if(step<2){step++;document.getElementById('pip'+(step-1)).classList.add('done');rQ();}else{document.getElementById('pip2').classList.add('done');sR();}};o.appendChild(b);});}
function sR(){document.getElementById('quizContent').style.display='none';const r=gR(answers);document.getElementById('resultGame').textContent=r.game;document.getElementById('resultDesc').textContent=r.desc;document.getElementById('resultLink').onclick=()=>{window.location.href=r.url;};document.getElementById('resultArea').classList.add('open');}
document.getElementById('startQuiz').onclick=function(){step=0;answers=[];['pip0','pip1','pip2'].forEach(id=>document.getElementById(id).classList.remove('done'));document.getElementById('quizContent').style.display='block';document.getElementById('resultArea').classList.remove('open');const qw=document.getElementById('quizWrap');qw.classList.toggle('open');if(qw.classList.contains('open'))rQ();};
document.getElementById('backBtn').onclick=function(){if(step>0){step--;answers.pop();document.getElementById('pip'+step).classList.remove('done');rQ();}};
document.getElementById('restartBtn').onclick=function(){step=0;answers=[];['pip0','pip1','pip2'].forEach(id=>document.getElementById(id).classList.remove('done'));document.getElementById('quizContent').style.display='block';document.getElementById('resultArea').classList.remove('open');rQ();};
</script>
</body>
</html>
